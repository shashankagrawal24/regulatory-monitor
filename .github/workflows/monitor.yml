name: Daily Regulatory Monitor

on:
  schedule:
    # Every day at 4:00 AM IST (10:30 PM UTC previous day)
    - cron: '30 22 * * *'
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run regulatory monitor
        run: cd scraper && python monitor.py

      - name: Move outputs to data
        run: |
          # monitor.py writes to data/ relative to scraper/
          # move to repo root data/ if needed
          if [ -d "scraper/data" ]; then
            cp -r scraper/data/* data/ 2>/dev/null || true
          fi

      - name: Check for new updates
        id: changes
        run: |
          git add -A data/
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push briefing
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "reg-monitor[bot]"
          git config user.email "bot@noveltywealth.com"
          git add data/
          UPDATES=$(python -c "import json; d=json.load(open('data/latest.json')); print(f\"{d['total']} updates, {d['high_priority']} high-priority\")" 2>/dev/null || echo "updates available")
          git commit -m "brief: $(date +%Y-%m-%d) regulatory update ($UPDATES)"
          git push
