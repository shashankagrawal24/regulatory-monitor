name: Daily Regulatory Monitor

on:
  schedule:
    # Run at 7:30 AM IST (2:00 AM UTC) every day
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run regulatory monitor
        run: python scraper/monitor.py

      - name: Commit and push results
        run: |
          git config user.name "reg-monitor[bot]"
          git config user.email "bot@noveltywealth.in"

          # Get today's date in IST
          TODAY=$(TZ='Asia/Kolkata' date +%Y-%m-%d)

          # Stage all data files (briefings, trend memory, health)
          git add data/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new updates today"
          else
            # Extract summary from latest.json
            TOTAL=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d['total'])")
            HIGH=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d['high_priority'])")
            git commit -m "brief: ${TODAY} (${TOTAL} updates, ${HIGH} high-priority)"
            git push
          fi
