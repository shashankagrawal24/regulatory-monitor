name: Daily Regulatory Monitor

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Copy outputs to repo data folder
        working-directory: .
        run: |
          mkdir -p data/briefings
          cp -f scraper/data/latest.json data/latest.json
          cp -f scraper/data/briefings/*.json data/briefings/ 2>/dev/null || true
          cp -f scraper/data/briefings/*.md data/briefings/ 2>/dev/null || true

      - name: Commit & push
        working-directory: .
        run: |
          git config user.name "reg-monitor[bot]"
          git config user.email "bot@noveltywealth.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          SUMMARY=$(python -c "import json; d=json.load(open('data/latest.json')); print(f\"{d['total']} updates, {d['high_priority']} high-priority\")" 2>/dev/null || echo "updates")
          git commit -m "brief: $(date +%Y-%m-%d) ($SUMMARY)"
          git push
