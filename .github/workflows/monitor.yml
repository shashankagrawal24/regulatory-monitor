name: Daily Regulatory Monitor
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r scraper/requirements.txt
    - name: Run scraper
      run: python scraper/monitor.py
    - name: Commit briefing
      run: |
        git config user.name "reg-monitor[bot]"
        git config user.email "bot@noveltywealth.in"
        DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
        HIGH=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d.get('high_priority',0))" 2>/dev/null || echo "0")
        TOTAL=$(python3 -c "import json; d=json.load(open('data/latest.json')); print(d.get('total',0))" 2>/dev/null || echo "0")
        git add data/
        git diff --cached --quiet || git commit -m "brief: ${DATE} (${TOTAL} updates, ${HIGH} high-priority)"
        git push
    - name: Send briefing to Slack
      if: always()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: python scraper/slack_notify.py
